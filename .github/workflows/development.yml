name: Tag Development Cycle 🛠️
on:
  push:
    branches:
      - development

permissions:
  contents: write

jobs:
  increment:
    if: github.event.commits != null && github.event.head_commit.author.name != 'GitHub Actions'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check pyproject.toml Existence
        id: check_pyproject_file
        uses: andstor/file-existence-action@v3
        with:
          files: "pyproject.toml"

      - name: Install UV
        if: steps.check_pyproject_file.outputs.files_exists == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Check Current Version
        if: steps.check_pyproject_file.outputs.files_exists == 'true'
        id: check_version
        shell: bash
        run: |
          CURRENT_VERSION=$(uv version --short)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          if [[ "$CURRENT_VERSION" == *".dev"* ]]; then
            echo "has_dev=true" >> $GITHUB_OUTPUT
          else
            echo "has_dev=false" >> $GITHUB_OUTPUT
          fi

      - name: Dry Run Version Minor and Dev Increment
        if: steps.check_version.outputs.has_dev == 'false'
        run: |
          uv version --bump minor --bump dev --dry-run

      - name: Version Minor and Dev Increment
        if: steps.check_version.outputs.has_dev == 'false'
        run: |
          uv version --bump minor --bump dev
          
      - name: Verify Version Changed
        if: steps.check_version.outputs.has_dev == 'false'
        run: git diff --exit-code pyproject.toml || echo "Version updated successfully"

      - name: Get Updated Version
        if: steps.check_pyproject_file.outputs.files_exists == 'true'
        id: version
        shell: bash
        run: |
          VERSION=$(uv version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit & Push Version Change
        if: steps.check_version.outputs.has_dev == 'false'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: development
          commit_message: "chore: bump development version to ${{ steps.version.outputs.version }}"
          file_pattern: pyproject.toml
