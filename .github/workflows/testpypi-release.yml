name: TestPyPI Release

on:
  workflow_run:
    workflows:
      - "Spawn Release Canidate"
    types: completed

permissions:
  contents: write
  id-token: write

jobs:

  publish-to-testpypi:
      name: Publish Python 🐍 Distribution 📦 to TestPyPi
      runs-on: ubuntu-latest
      environment:
        name: testpypi
        url: https://test.pypi.org/p/${{ steps.repo_name.outputs.name }}
      
      steps:
  
        - name: Set Lowercase Repository Name
          id: repo_name
          run: echo "name=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
        
        - name: Download Distribution Packages
          uses: actions/download-artifact@v4
          with:
            name: release-canidate-python-package-distributions
            path: dist/
        
        - name: Publish Distribution 📦 to TestPyPI
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            repository-url: https://test.pypi.org/legacy/
            skip-existing: true
            verbose: true

  install:
    name: Check TestPyPi Distribution Installatiop❓
    runs-on: ubuntu-latest
    needs: publish-to-testpypi

    permissions: write-all
    
    steps:

      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
  
      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Install TOML ⚙️ CLI
        run: uv tool install toml-cli

      - name: Create Test Virtual Enviroment
        run: |
          uv venv test-env
          source test-env/bin/activate
        
      - name: Test installation from TestPyPI
        run: |
          uv install --index-url https://test.pypi.org/simple/ $( toml get --toml-path pyproject.toml project.name )==$( uv version )
      
      - name: Smoke Test Test Index
        run: uv run python -c "import $( toml get --toml-path pyproject.toml project.name ); print('OK')"

  create-github-release:
    needs: [publish-to-testpypi, install]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: candidate

      - name: Setup UV
        uses: astral-sh/setup-uv@v7

      - name: Extract Version
        id: version
        shell: bash
        run: |
          VERSION=$( uv version )
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'v${{ steps.version.outputs.version }}',
              name: 'Release v${{ steps.version.outputs.version }}',
              draft: false,
              prerelease: true
            })
