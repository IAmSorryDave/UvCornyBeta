name: Prepare PyPI Production Release 🐍

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write
  pull-requests: write

jobs:

  build:
    name: Build Distribution 📦; Cache Distribution ⬆️
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
  
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UV
        uses: astral-sh/setup-uv@v7
      
      - name: Dry Run Stable Version Increment
        run: |
          uv version --bump stable --dry-run

      - name: Stable Version Increment
        run: |
          uv version --bump stable 

      - name: Verify Version Changed
        run: git diff --exit-code pyproject.toml || echo "Version updated successfully"

      - name: Build Distribution
        run: uv build

      - name: Store Distribution Packages
        uses: actions/upload-artifact@v4
        with:
          name: pypi-python-package-distributions
          path: dist/
          retention-days: 1
