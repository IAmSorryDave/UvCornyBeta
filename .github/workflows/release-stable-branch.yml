name: Spawn Stable Branch 🗒️

on: 
  push:
    branches: beta

permissions: write-all

jobs:

    increment:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Code
          uses: actions/checkout@v6
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
  
        - name: Setup UV
          uses: astral-sh/setup-uv@v7

        - name: Dry Run Version Increment
          run: |
            uv version --bump beta --dry-run
  
        - name: Version Increment
          run: |
            uv version --bump beta
  
        - name: Verify Version Changed
          run: git diff --exit-code pyproject.toml || echo "Version updated successfully"
  
        - name: Increment Beta Version
          id: version
          shell: bash
          run: |
            VERSION=$(uv version --short)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
  
        - name: Commit & Push Version Change
          uses: stefanzweifel/git-auto-commit-action@v7
          with:
            branch: beta
            commit_message: "chore: bump beta version to ${{ steps.version.outputs.version }}"
            file_pattern: pyproject.toml

        - name: Create Git Tag
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a v${{ steps.version.outputs.version }} -m "Release ${{ steps.version.outputs.version }}"
            git push origin v${{ steps.version.outputs.version }}
       

    release:
      permissions: # Read more at : https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs
        contents: write
      name: Create Branch
      needs: increment
      runs-on: ubuntu-latest
      steps:
      
        - name: Checkout Code
          uses: actions/checkout@v6
          with:
            ref: beta
            token: ${{ secrets.GITHUB_TOKEN }}
    
        - name: Setup UV
          uses: astral-sh/setup-uv@v7

        - name: Get Stable Version
          run: VERSION=$(uv version --short)

        - name: Create release branch from version
          run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git checkout beta
            git checkout -b release@v${VERSION}


        
  
