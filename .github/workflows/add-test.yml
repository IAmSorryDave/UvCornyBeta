name: Add Test Set 🧪 to Development Branch / Begin New Development Development.

on:
  pull_request: 
    branches: 
      - development
    types: closed

permissions:
  contents: write
  pull-requests: write
  
jobs:

  increment:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
    
    - name: Checkout Project
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install UV
      uses: astral-sh/setup-uv@v7
    
    - name: Dry Run Version Increment
      run: |
        uv version --bump minor --bump dev --dry-run

    - name: Version Increment
      run: |
        uv version --bump minor --bump dev
    
    - name: Verify Version Changed
      run: git diff --exit-code pyproject.toml || echo "Version updated successfully"

    - name: Increment Minor Version
      id: version
      shell: bash
      run: |
        VERSION=$(uv version)
        echo "version=$VERSION" >> $GITHUB_OUTPUT 

    - name: Commit & Push Version Change
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        branch: development
        commit_message: "chore: bump development version to ${{ steps.version.outputs.version }}"
        file_pattern: pyproject.toml
