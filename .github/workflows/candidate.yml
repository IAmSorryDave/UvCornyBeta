
name: Spawn Release Candidate 🧪

on:
  push: 
    branches:
      - candidate

jobs:

  increment:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          ref: candidate
  
      - name: Install UV
        uses: astral-sh/setup-uv@v7
      
      - name: Dry Run Version Increment
        run: |
          uv version --bump rc --dry-run

      - name: Version Increment
        run: |
          uv version --bump rc

      - name: Verify Version Changed
        run: git diff --exit-code pyproject.toml || echo "Version updated successfully"

      - name: Increment Release Candidate Version
        id: version
        shell: bash
        run: |
          VERSION=$( uv version --short)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit & Push Version Change
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: candidate
          commit_message: "chore: bump rc version to ${{ steps.version.outputs.version }}"
          file_pattern: pyproject.toml
          
  build:
    name: Build Distribution 📦; Cache Distribution ⬆️
    needs: increment
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: success()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: candidate

      - name: Setup UV
        uses: astral-sh/setup-uv@v7

      - name: Build Package
        run: uv build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-canidate-python-package-distributions
          path: dist/
          retention-days: 3

  hotfix:
    permissions: # Read more at : https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs
      contents: write
    name: Create Branch
    needs: increment
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: candidate
          fetch-depth: 0

      - name: Setup UV
        uses: astral-sh/setup-uv@v7

      - name: Create release branch from version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout candidate
          git checkout -b hotfix
          git push origin hotfix

  release:
    permissions: # Read more at : https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs
      contents: write
    name: Create Branch
    needs: hotfix
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: hotfix
          fetch-depth: 0  # Fetch all history

      - name: Setup UV
        uses: astral-sh/setup-uv@v7

      - name: Create release branch from version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout hotfix
          git checkout -b release@v$(uv version --short)
          git push origin release@v$(uv version --short)

  publish-to-testpypi:
      name: Publish Python 🐍 Distribution 📦 to TestPyPi
      runs-on: ubuntu-latest
      needs: 
        - build
        - increment
        - release
      if: success()
      permissions:
        contents: write
        id-token: write
      environment:
        name: testpypi
        url: https://test.pypi.org/p/${{ steps.repo_name.outputs.name }}
      
      steps:
  
        - name: Set Lowercase Repository Name
          id: repo_name
          run: echo "name=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
        
        - name: Download Distribution Packages
          uses: actions/download-artifact@v4
          with:
            name: release-canidate-python-package-distributions
            path: dist/
        
        - name: Publish Distribution 📦 to TestPyPI
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            repository-url: https://test.pypi.org/legacy/
            skip-existing: true
            verbose: true
